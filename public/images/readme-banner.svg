  <rect x="1018" y="128" width="430" height="384" rx="42" stroke="#FFFFFF" stroke-opacity="0.18"/>

  <g opacity="0.8">
    <circle cx="1432" cy="104" r="2.5" fill="#E0F2FE"/>
    <circle cx="1372" cy="570" r="2" fill="#E9D5FF"/>
    <circle cx="842" cy="78" r="2" fill="#67E8F9"/>
    <circle cx="776" cy="522" r="2.5" fill="#C4B5FD"/>
