    <path d="M1018 384C1106 352 1144 292 1226 318C1316 347 1368 426 1448 390V512H1018V384Z" fill="#020617" fill-opacity="0.58"/>
    <circle cx="1250" cy="282" r="116" fill="#0F172A" stroke="url(#line)" stroke-width="2" stroke-opacity="0.9"/>
    <path d="M1202 258C1202 214 1232 184 1272 184C1318 184 1346 218 1346 260C1346 315 1302 354 1270 396C1254 374 1202 324 1202 258Z" fill="#E9D5FF" fill-opacity="0.9"/>
    <path d="M1270 184C1318 184 1346 218 1346 260C1346 315 1302 354 1270 396V184Z" fill="#22D3EE" fill-opacity="0.62"/>
    <rect x="1122" y="450" width="222" height="16" rx="8" fill="#FFFFFF" fill-opacity="0.2"/>
    <rect x="1174" y="474" width="118" height="10" rx="5" fill="#FFFFFF" fill-opacity="0.12"/>
